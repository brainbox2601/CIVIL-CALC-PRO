<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Barlow:ital,wght@0,300;0,400;0,600;0,800;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Blueprint Industrial Dark
═══════════════════════════════════════════════ */
:root {
  --bg:       #080c14;
  --surface:  #0d1421;
  --surface2: #111927;
  --surface3: #162030;
  --border:   #1e2d40;
  --border2:  #253548;
  --blue:     #0ea5e9;
  --blue-dim: rgba(14,165,233,0.12);
  --blue-glow:rgba(14,165,233,0.25);
  --orange:   #f59e0b;
  --orange-dim:rgba(245,158,11,0.12);
  --green:    #10b981;
  --green-dim:rgba(16,185,129,0.12);
  --red:      #ef4444;
  --red-dim:  rgba(239,68,68,0.12);
  --text:     #e2eaf5;
  --text2:    #8ba0bc;
  --text3:    #4a6080;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Barlow', sans-serif;
  --radius:   8px;
  --sidebar:  240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Blueprint grid background */
body::before {
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── AUTH SCREEN ── */
.auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;padding:20px;
}
.auth-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:48px 40px;width:100%;max-width:420px;
  box-shadow:0 0 60px rgba(14,165,233,0.08);
  animation:fadeUp 0.5s ease;
}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-text{font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;color:var(--text)}
.auth-logo-text span{color:var(--blue)}
.auth-logo-sub{font-family:var(--mono);font-size:0.65rem;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase;margin-top:4px}
.auth-tabs{display:flex;background:var(--surface2);border-radius:8px;padding:4px;margin-bottom:28px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:0.82rem;font-weight:600;cursor:pointer;border-radius:6px;transition:all 0.15s;color:var(--text3);border:none;background:transparent;font-family:var(--sans)}
.auth-tab.active{background:var(--blue);color:#fff}
.auth-title{font-size:1.2rem;font-weight:800;margin-bottom:6px;letter-spacing:-0.02em}
.auth-sub{font-size:0.82rem;color:var(--text2);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.field input{
  width:100%;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:0.9rem;
  outline:none;transition:border-color 0.15s;
}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.field input::placeholder{color:var(--text3)}
.btn{
  width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius);font-family:var(--sans);font-size:0.9rem;font-weight:700;
  letter-spacing:0.04em;cursor:pointer;transition:all 0.15s;
}
.btn:hover{background:#38bdf8;box-shadow:0 0 20px var(--blue-glow)}
.btn.secondary{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.btn.secondary:hover{background:var(--surface2);color:var(--text);box-shadow:none}
.btn.danger{background:var(--red)}
.btn.success{background:var(--green)}
.btn.warning{background:var(--orange);color:#000}
.auth-error{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:10px 14px;border-radius:var(--radius);font-size:0.82rem;margin-bottom:16px}

/* ── APP LAYOUT ── */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-head{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;color:var(--text);line-height:1}
.sidebar-logo span{color:var(--blue)}
.sidebar-version{font-family:var(--mono);font-size:0.6rem;color:var(--text3);letter-spacing:0.15em;margin-top:4px}
.sidebar-user{
  margin:12px 0 0;padding:10px 12px;background:var(--surface2);border-radius:var(--radius);
  display:flex;align-items:center;gap:10px;
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#6366f1);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem;flex-shrink:0;
}
.user-name{font-size:0.78rem;font-weight:600;color:var(--text)}
.user-role{font-family:var(--mono);font-size:0.6rem;color:var(--text3)}

.nav{padding:12px 12px;flex:1}
.nav-group-label{
  font-family:var(--mono);font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text3);padding:0 8px;margin-bottom:6px;margin-top:16px;
}
.nav-group-label:first-child{margin-top:0}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;
  cursor:pointer;transition:all 0.15s;color:var(--text2);font-size:0.82rem;font-weight:400;
  border:none;background:transparent;width:100%;text-align:left;
  font-family:var(--sans);margin-bottom:2px;
}
.nav-item .ni-icon{
  width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;background:var(--surface2);flex-shrink:0;transition:background 0.15s;
}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--blue);background:var(--blue-dim);font-weight:600}
.nav-item.active .ni-icon{background:var(--blue);filter:brightness(0) invert(1) sepia(1) saturate(5) hue-rotate(180deg)}
.nav-item.active .ni-icon{background:rgba(14,165,233,0.2)}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.logout-btn{
  display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;
  background:transparent;border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text3);font-size:0.78rem;cursor:pointer;font-family:var(--sans);transition:all 0.15s;
}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── MAIN ── */
.main{min-width:0;overflow-y:auto;min-height:100vh}
.page-head{
  padding:28px 36px 0;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,var(--surface) 0%,transparent 100%);
  position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);
}
.breadcrumb{font-family:var(--mono);font-size:0.62rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.breadcrumb span{color:var(--blue)}
.page-title{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px}
.page-desc{font-size:0.85rem;color:var(--text2);padding-bottom:20px}
.page-body{padding:28px 36px}

/* ── DASHBOARD ── */
.hero{
  background:linear-gradient(135deg,var(--surface2) 0%,var(--surface3) 100%);
  border:1px solid var(--border);border-radius:12px;padding:32px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;right:-60px;top:-60px;
  width:250px;height:250px;border-radius:50%;
  background:radial-gradient(circle,var(--blue-dim) 0%,transparent 70%);
}
.hero-title{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px;position:relative}
.hero-sub{font-size:0.85rem;color:var(--text2);max-width:520px;line-height:1.7;position:relative}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;background:var(--blue-dim);
  border:1px solid rgba(14,165,233,0.25);color:var(--blue);padding:4px 12px;
  border-radius:20px;font-size:0.7rem;font-family:var(--mono);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:14px;
}
.dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;transition:border-color 0.15s;
}
.stat:hover{border-color:var(--border2)}
.stat-val{font-size:1.6rem;font-weight:800;font-family:var(--mono);letter-spacing:-0.03em}
.stat-label{font-size:0.7rem;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.stat-delta{font-size:0.7rem;margin-top:6px;font-family:var(--mono)}

.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.calc-tile{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;
  cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;gap:10px;
}
.calc-tile:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 32px rgba(14,165,233,0.1)}
.tile-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.tile-title{font-weight:700;font-size:0.95rem;letter-spacing:-0.01em}
.tile-desc{font-size:0.78rem;color:var(--text2);line-height:1.6}
.tile-tag{
  display:inline-flex;align-items:center;font-family:var(--mono);font-size:0.6rem;
  letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:4px;
  margin-top:auto;width:fit-content;
}

/* ── CALCULATOR LAYOUT ── */
.calc-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.calc-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px}
.panel-title{font-size:0.75rem;font-family:var(--mono);letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FORM */
.f-group{margin-bottom:14px}
.f-label{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.f-label span{font-size:0.6rem;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}
.f-input{
  width:100%;padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.85rem;outline:none;transition:border-color 0.15s;
}
.f-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.f-select{width:100%;padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.82rem;outline:none;cursor:pointer;transition:border-color 0.15s}
.f-select:focus{border-color:var(--blue)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-note{font-family:var(--mono);font-size:0.62rem;color:var(--text3);margin-top:4px}

.calc-btn{
  width:100%;padding:12px;margin-top:6px;background:var(--blue);color:#fff;border:none;
  border-radius:6px;font-family:var(--sans);font-size:0.85rem;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;
}
.calc-btn:hover{box-shadow:0 0 20px var(--blue-glow);background:#38bdf8}
.calc-btn.orange{background:var(--orange);color:#000}
.calc-btn.green{background:var(--green)}

/* RESULT */
.result{margin-top:16px;padding:16px;border-radius:8px;border:1px solid;animation:popIn 0.2s ease}
.result.ok{background:var(--green-dim);border-color:rgba(16,185,129,0.3);color:var(--green)}
.result.err{background:var(--red-dim);border-color:rgba(239,68,68,0.3);color:var(--red)}
.result.info{background:var(--blue-dim);border-color:rgba(14,165,233,0.3);color:var(--blue)}
.result.warn{background:var(--orange-dim);border-color:rgba(245,158,11,0.3);color:var(--orange)}
.r-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.r-item{background:rgba(0,0,0,0.2);border-radius:6px;padding:10px}
.r-key{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.7;margin-bottom:4px}
.r-val{font-family:var(--mono);font-size:1rem;font-weight:700}
.r-unit{font-size:0.7rem;font-weight:400;opacity:0.8;margin-left:3px}
.r-note{font-size:0.75rem;opacity:0.8;line-height:1.6;margin-top:8px;font-family:var(--mono)}
.r-formula{
  background:rgba(0,0,0,0.3);border-radius:4px;padding:8px 12px;
  font-family:var(--mono);font-size:0.72rem;margin-top:8px;letter-spacing:0.03em;
  border-left:2px solid currentColor;
}
.status-badge{
  display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;
}
.status-safe{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.status-unsafe{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.status-warn{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(245,158,11,0.3)}

/* CHART */
.chart-wrap{position:relative;height:240px;margin-top:10px}
.chart-wrap canvas{border-radius:6px}

/* HISTORY */
.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;
  transition:border-color 0.15s;
}
.history-item:hover{border-color:var(--border2)}
.hi-title{font-weight:600;font-size:0.88rem;margin-bottom:3px}
.hi-meta{font-family:var(--mono);font-size:0.65rem;color:var(--text3)}
.hi-result{font-family:var(--mono);font-size:0.8rem;color:var(--blue);text-align:right}
.hi-del{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:1rem;transition:color 0.15s;padding:2px 6px}
.hi-del:hover{color:var(--red)}
.empty-state{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-msg{font-size:0.85rem}

/* PROFILE PAGE */
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px;margin-bottom:20px}
.profile-avatar-lg{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1.5rem;margin-bottom:16px;
}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;margin:3px}
.tag.blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(14,165,233,0.2)}
.tag.green{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.tag.orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(245,158,11,0.2)}

/* TOOLTIP / FORMULA BOX */
.formula-box{
  background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);
  border-radius:4px;padding:12px 16px;margin:12px 0;
  font-family:var(--mono);font-size:0.75rem;color:var(--blue);line-height:1.8;
}
.formula-box strong{color:var(--text);font-weight:500}

/* SECTION DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(14,165,233,0.4)}50%{box-shadow:0 0 0 6px rgba(14,165,233,0)}}
.animate{animation:fadeUp 0.4s ease both}

/* ── MOBILE HAMBURGER TOGGLE ── */
/* Hidden on desktop, visible below 1024px */
.mob-toggle{
  display:none;
  position:fixed;top:14px;left:14px;z-index:200;
  width:42px;height:42px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);font-size:1.1rem;cursor:pointer;
  align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
  transition:background 0.15s;
}
.mob-toggle:hover{background:var(--surface3)}

/* Full-screen backdrop — solid dark, no blur, high z-index */
.mob-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  z-index:150; /* below sidebar, above everything else */
  backdrop-filter:none; /* intentionally off — we want sharp overlay */
}

/* RESPONSIVE */
@media(max-width:900px){
  .calc-layout{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:1024px){
  /* Collapse sidebar into off-canvas drawer */
  :root{--sidebar:0px}
  .app{grid-template-columns:1fr}

  .sidebar{
    position:fixed;
    left:-280px;       /* fully off-screen when closed */
    width:260px;
    z-index:160;       /* above backdrop (150) */
    transition:left 0.25s cubic-bezier(0.4,0,0.2,1);
    height:100vh;
    box-shadow:none;
  }
  .sidebar.open{
    left:0;
    box-shadow:4px 0 32px rgba(0,0,0,0.6); /* depth shadow when open */
  }

  /* Hamburger becomes visible */
  .mob-toggle{display:flex}

  /* Backdrop activates when sidebar is open */
  .mob-overlay.show{display:block}

  /* Shift page header right to avoid hamburger overlap */
  .page-head{padding:18px 16px 0 64px}
  .page-body{padding:18px 16px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .r-grid{grid-template-columns:1fr}
}
</style>
</head>

   FIX 1 — GAMIL GUARD
   Detects common email provider typos and warns the user.
   Checks on blur (when user leaves the field).
══════════════════════════════════════════════════ */
const TYPO_MAP = {
  'gamil.com':   'gmail.com',
  'gmai.com':    'gmail.com',
  'gmial.com':   'gmail.com',
  'gnail.com':   'gmail.com',
  'yaho.com':    'yahoo.com',
  'yahooo.com':  'yahoo.com',
  'hotmai.com':  'hotmail.com',
  'outlok.com':  'outlook.com',
};

function checkEmailTypo(email) {
  if (!email || !email.includes('@')) return null;
  const domain = email.split('@')[1]?.toLowerCase();
  const correct = TYPO_MAP[domain];
  if (correct) return `Possible typo? Did you mean @${correct}?`;
  return null;
}

/* ══════════════════════════════════════════════════
   FIX 3 — GOOGLE AUTH HELPERS
   Decodes a Google JWT credential (no library needed —
   the payload is just base64url encoded JSON).
══════════════════════════════════════════════════ */
function decodeGoogleJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(atob(base64));
  } catch { return null; }
}

function loginWithGoogleCredential(credential, onLogin) {
  const payload = decodeGoogleJwt(credential);
  if (!payload) return;

  const googleUser = {
    id:      `google_${payload.sub}`,
    name:    payload.name,
    email:   payload.email,
    role:    'Engineer',
    picture: payload.picture,
    joined:  new Date().toISOString(),
    googleId: payload.sub,
  };

  // Merge into users list so subsequent email/password logins still work
  const users = store.get('users') || [];
  const existing = users.find(u => u.email === googleUser.email);
  if (!existing) store.set('users', [...users, { ...googleUser, password: '' }]);

  store.set('session', googleUser);
  onLogin(googleUser);
}

/* ══════════════════════════════════════════════════
   FIX 4 — HISTORY HOOK (Auth Persistence)
   Problem: useState initializer runs once at mount.
   If userId changes after mount (e.g. after login),
   the history state stays stale until refresh.

   Fix: useEffect re-reads from localStorage whenever
   userId changes, so the count is always correct
   immediately after login — no refresh needed.
══════════════════════════════════════════════════ */
function useHistory(userId) {
  const key = `history_${userId}`;

  // Start with empty array — useEffect fills it immediately after mount
  const [history, setHistory] = useState([]);

  // Fix 4: sync from localStorage whenever userId becomes available
  useEffect(() => {
    if (userId) {
      setHistory(store.get(`history_${userId}`) || []);
    } else {
      setHistory([]);
    }
  }, [userId]); // re-run when user changes (login / logout)

  const save = useCallback((type, inputs, results, summary) => {
    const entry = { id: Date.now(), type, inputs, results, summary, date: new Date().toISOString() };
    const h = [entry, ...((store.get(key)||[]).slice(0,49))];
    store.set(key, h);
    setHistory(h);
  }, [key]);

  const remove = useCallback(id => {
    const h = (store.get(key)||[]).filter(e => e.id !== id);
    store.set(key, h);
    setHistory(h);
  }, [key]);

  const clear = useCallback(() => { store.set(key,[]); setHistory([]); }, [key]);

  return { history, save, remove, clear };
}

/* ══════════════════════════════════════════════════
   CHART COMPONENT
══════════════════════════════════════════════════ */
function ChartCanvas({ type, data, options }) {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current, {
      type,
      data,
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8ba0bc', font: { family: 'JetBrains Mono', size: 11 } } } },
        scales: {
          x: { grid: { color: 'rgba(30,45,64,0.8)' }, ticks: { color: '#4a6080', font: { family: 'JetBrains Mono', size: 10 } } },
          y: { grid: { color: 'rgba(30,45,64,0.8)' }, ticks: { color: '#4a6080', font: { family: 'JetBrains Mono', size: 10 } } },
        },
        ...options,
      },
    });
    return () => chartRef.current?.destroy();
  }, [type, JSON.stringify(data)]);
  return <canvas ref={ref}/>;
}

/* ── 1. BEAM DEFLECTION & ANALYSIS ── */
function BeamCalc({ onSave }) {
  const [f, setF] = useState({ load:'50', span:'6', type:'ss', E:'200', I:'8500', width:'', depth:'' });
  const [r, setR] = useState(null);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));

  const calc = () => {
    const P=+f.load, L=+f.span, E=+f.E*1e9, I=+f.I*1e-8;
    if([P,L,E,I].some(v=>!v||v<=0)){setR({err:'Enter valid positive values for all required fields.'});return;}
    let Mmax,Vmax,dmax,formula,reactions;
    if(f.type==='ss'){
      Mmax=P*L/4; Vmax=P/2;
      dmax=(P*L**3)/(48*E*I)*1000;
      formula='Simply Supported: M_max=PL/4 | δ_max=PL³/48EI';
      reactions={RA:P/2,RB:P/2};
    } else if(f.type==='cant'){
      Mmax=P*L; Vmax=P;
      dmax=(P*L**3)/(3*E*I)*1000;
      formula='Cantilever: M_max=PL | δ_max=PL³/3EI';
      reactions={RA:P,RB:0};
    } else if(f.type==='ff'){
      Mmax=P*L/8; Vmax=P/2;
      dmax=(P*L**3)/(192*E*I)*1000;
      formula='Fixed-Fixed: M_max=PL/8 | δ_max=PL³/192EI';
      reactions={RA:P/2,RB:P/2};
    } else {
      Mmax=5*P*L/16; Vmax=11*P/16;
      dmax=(P*L**3)/(107*E*I)*1000;
      formula='Propped Cantilever: M_max≈5PL/16 | δ_max≈PL³/107EI';
      reactions={RA:11*P/16,RB:5*P/16};
    }
    let stress=null;
    if(f.width&&f.depth){
      const b=+f.width/1000,d=+f.depth/1000;
      if(b>0&&d>0){const S=(b*d*d)/6;stress=Mmax/S/1e6;}
    }
    // Build BMD chart data (parabolic approximation for UDL, triangular for point load)
    const pts=20;
    const bmdLabels=Array.from({length:pts+1},(_,i)=>(i*L/pts).toFixed(2));
    const bmdData=bmdLabels.map(x=>{
      x=+x;
      if(f.type==='ss') return P*x*(L-x)/(2*L);
      if(f.type==='cant') return -P*(L-x);
      if(f.type==='ff') return P*x*(L-x)/(L*L)*(L-x)/4;
      return P*x*(L-x)/(L*L)*(1.5*L-x)/4;
    });
    const sfdData=bmdLabels.map(x=>{
      x=+x;
      if(f.type==='cant') return -P;
      return x<L/2?P/2:-(P/2);
    });
    const res={Mmax:Mmax.toFixed(2),Vmax:Vmax.toFixed(2),dmax:dmax.toFixed(3),stress:stress?stress.toFixed(2):null,formula,reactions,bmdLabels,bmdData,sfdData};
    setR(res);
    onSave('Beam Analysis',f,res,`M=${res.Mmax}kN·m, δ=${res.dmax}mm`);
  };

  const safeDefl = r && +r.dmax < (+f.span*1000/360);

  return (
    <div>
      <div className="formula-box">
        <strong>Bending Stress:</strong> σ = M/S where S = bd²/6 (section modulus)<br/>
        <strong>Deflection:</strong> depends on support conditions and load position<br/>
        <strong>E_steel</strong> = 200 GPa | <strong>E_concrete</strong> ≈ 25–35 GPa
      </div>
      <div className="calc-layout">
        <div className="calc-panel">
          <div className="panel-title">Input Parameters</div>
          <div className="f-group">
            <div className="f-label">Support Condition</div>
            <select className="f-select" value={f.type} onChange={set('type')}>
              <option value="ss">Simply Supported</option>
              <option value="cant">Cantilever (free end load)</option>
              <option value="ff">Fixed-Fixed (both ends)</option>
              <option value="pc">Propped Cantilever</option>
            </select>
          </div>
          <div className="f-row">
            <div className="f-group">
              <div className="f-label">Point Load <span>(kN)</span></div>
              <input className="f-input" type="number" value={f.load} onChange={set('load')} placeholder="50"/>
            </div>
            <div className="f-group">
              <div className="f-label">Span Length <span>(m)</span></div>
              <input className="f-input" type="number" value={f.span} onChange={set('span')} placeholder="6"/>
            </div>
          </div>
          <div className="f-row">
            <div className="f-group">
              <div className="f-label">Elastic Modulus <span>(GPa)</span></div>
              <input className="f-input" type="number" value={f.E} onChange={set('E')} placeholder="200"/>
              <div className="f-note">Steel=200 | Concrete≈30</div>
            </div>
            <div className="f-group">
              <div className="f-label">Moment of Inertia <span>(cm⁴)</span></div>
              <input className="f-input" type="number" value={f.I} onChange={set('I')} placeholder="8500"/>
            </div>
          </div>
          <div style={{marginBottom:8,fontSize:'0.72rem',color:'var(--text3)',fontFamily:'var(--mono)'}}>— Optional: section for stress —</div>
          <div className="f-row">
            <div className="f-group">
              <div className="f-label">Width <span>(mm)</span></div>
              <input className="f-input" type="number" value={f.width} onChange={set('width')} placeholder="200"/>
            </div>
            <div className="f-group">
              <div className="f-label">Depth <span>(mm)</span></div>
              <input className="f-input" type="number" value={f.depth} onChange={set('depth')} placeholder="400"/>
            </div>
          </div>
          <button className="calc-btn" onClick={calc}>Run Analysis</button>
          {r && !r.err && (
            <div className={`result ${safeDefl?'ok':'warn'}`}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{fontFamily:'var(--mono)',fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'0.12em'}}>Results</div>
                <span className={safeDefl?'status-badge status-safe':'status-badge status-warn'}>{safeDefl?'✓ Within L/360':'⚠ Exceeds L/360'}</span>
              </div>
              <div className="r-grid">
                <div className="r-item"><div className="r-key">Max Bending Moment</div><div className="r-val">{r.Mmax}<span className="r-unit">kN·m</span></div></div>
                <div className="r-item"><div className="r-key">Max Shear Force</div><div className="r-val">{r.Vmax}<span className="r-unit">kN</span></div></div>
                <div className="r-item"><div className="r-key">Max Deflection</div><div className="r-val">{r.dmax}<span className="r-unit">mm</span></div></div>
                {r.stress && <div className="r-item"><div className="r-key">Bending Stress</div><div className="r-val">{r.stress}<span className="r-unit">MPa</span></div></div>}
                <div className="r-item"><div className="r-key">Reaction RA</div><div className="r-val">{r.reactions.RA.toFixed(1)}<span className="r-unit">kN</span></div></div>
                <div className="r-item"><div className="r-key">Reaction RB</div><div className="r-val">{r.reactions.RB.toFixed(1)}<span className="r-unit">kN</span></div></div>
              </div>
              <div className="r-formula">{r.formula}</div>
            </div>
          )}
          {r?.err && <div className="result err"><div className="r-val" style={{fontSize:'0.85rem'}}>{r.err}</div></div>}
        </div>
        <div className="calc-panel">
          <div className="panel-title">Bending Moment Diagram</div>
          {r && !r.err ? (
            <>
              <div className="chart-wrap">
                <ChartCanvas type="line" data={{
                  labels: r.bmdLabels,
                  datasets:[{
                    label:'Bending Moment (kN·m)',
                    data: r.bmdData,
                    borderColor:'#0ea5e9',backgroundColor:'rgba(14,165,233,0.1)',
                    fill:true,tension:0.4,pointRadius:0,borderWidth:2,
                  }]
                }}/>
              </div>
              <div className="panel-title" style={{marginTop:16}}>Shear Force Diagram</div>
              <div className="chart-wrap" style={{height:160}}>
                <ChartCanvas type="line" data={{
                  labels: r.bmdLabels,
                  datasets:[{
                    label:'Shear Force (kN)',
                    data: r.sfdData,
                    borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.08)',
                    fill:true,tension:0,pointRadius:0,borderWidth:2,stepped:true,
                  }]
                }}/>
              </div>
            </>
          ) : (
            <div className="empty-state"><div className="empty-icon">📊</div><div className="empty-msg">Run the analysis to generate BMD and SFD diagrams</div></div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── 2. CONCRETE MIX DESIGN ── */
function ConcreteMix({ onSave }) {
  const [f, setF] = useState({ grade:'M20', vol:'10', unit:'m3', cement_type:'OPC43', admixture:false });
  const [r, setR] = useState(null);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const MIXES = {
    M10:{ratio:'1:3:6',cement_bags:4.4,fa:0.44,ca:0.88,wc:0.60,fck:10},
    M15:{ratio:'1:2:4',cement_bags:6.2,fa:0.46,ca:0.92,wc:0.55,fck:15},
    M20:{ratio:'1:1.5:3',cement_bags:8.0,fa:0.44,ca:0.88,wc:0.50,fck:20},
    M25:{ratio:'1:1:2',cement_bags:9.5,fa:0.42,ca:0.84,wc:0.45,fck:25},
    M30:{ratio:'Design Mix',cement_bags:10.8,fa:0.40,ca:0.80,wc:0.40,fck:30},
    M35:{ratio:'Design Mix',cement_bags:11.5,fa:0.38,ca:0.76,wc:0.38,fck:35},
    M40:{ratio:'Design Mix',cement_bags:12.2,fa:0.36,ca:0.72,wc:0.35,fck:40},
  };
  const calc = () => {
    let vol=+f.vol;
    if(!vol||vol<=0){setR({err:'Enter valid concrete volume.'});return;}
    if(f.unit==='ft3') vol*=0.0283168;
    const m=MIXES[f.grade];
    const cement_kg=m.cement_bags*vol*50;
    const water_L=(cement_kg*m.wc).toFixed(0);
    const admixture_kg=f.admixture?(cement_kg*0.008).toFixed(2):null;
    const res={
      grade:f.grade,ratio:m.ratio,fck:m.fck,vol:vol.toFixed(3),
      cement_bags:(m.cement_bags*vol).toFixed(1),
      cement_kg:cement_kg.toFixed(0),
      fa_m3:(m.fa*vol).toFixed(3),fa_kg:(m.fa*vol*1650).toFixed(0),
      ca_m3:(m.ca*vol).toFixed(3),ca_kg:(m.ca*vol*1500).toFixed(0),
      water_L,wc:m.wc,admixture_kg,
    };
    setR(res);
    onSave('Concrete Mix',f,res,`${f.grade} — ${res.cement_bags} bags, ${vol.toFixed(2)}m³`);
  };
  return (
    <div>
      <div className="formula-box">
        <strong>IS 456:2000</strong> Nominal mix proportions by volume<br/>
        <strong>Water-Cement Ratio</strong>: controls strength — lower w/c = higher strength<br/>
        <strong>Note:</strong> For M30+ always use designed mix per IS 10262
      </div>
      <div className="calc-layout">
        <div className="calc-panel">
          <div className="panel-title">Mix Design Inputs</div>
          <div className="f-group">
            <div className="f-label">Concrete Grade</div>
            <select className="f-select" value={f.grade} onChange={set('grade')}>
              {Object.keys(MIXES).map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
          <div className="f-row">
            <div className="f-group">
              <div className="f-label">Volume <span>{f.unit==='m3'?'(m³)':'(ft³)'}</span></div>
              <input className="f-input" type="number" value={f.vol} onChange={set('vol')}/>
            </div>
            <div className="f-group">
              <div className="f-label">Unit</div>
              <select className="f-select" value={f.unit} onChange={set('unit')}>
                <option value="m3">Cubic Metres (m³)</option>
                <option value="ft3">Cubic Feet (ft³)</option>
              </select>
            </div>
          </div>
          <div className="f-group">
            <div className="f-label">Cement Type</div>
            <select className="f-select" value={f.cement_type} onChange={set('cement_type')}>
              <option value="OPC43">OPC 43 Grade</option>
              <option value="OPC53">OPC 53 Grade</option>
              <option value="PPC">PPC (Portland Pozzolana)</option>
              <option value="SRC">Sulphate Resistant Cement</option>
            </select>

/* ── 3. LOAD CALCULATIONS ── */
function LoadCalc({ onSave }) {
  const [f, setF] = useState({ length:'8', width:'5', floors:'3', floor_h:'3', dead_slab:'4', dead_finish:'1.5', dead_walls:'3', live:'3', snow:'0', wind_speed:'30', wind_zone:'2', seismic:'2' });
  const [r, setR] = useState(null);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const calc = () => {
    const L=+f.length,W=+f.width,floors=+f.floors;
    const area=L*W;
    const DL=(+f.dead_slab + +f.dead_finish + +f.dead_walls)*area*floors;
    const LL=+f.live*area*floors;
    const SL=+f.snow*area;
    // IS 875 Wind: Vd = Vb × k1 × k2 × k3; simplified
    const Vb=+f.wind_speed;
    const pz=0.6*Vb*Vb/1000; // kN/m²
    const h=floors*+f.floor_h;
    const WL=pz*L*h*0.7; // Cf=0.7 simplified
    // Seismic (IS 1893 simplified): Ah = Z/2 × I/R × (Sa/g)
    const Z_vals={1:0.10,2:0.16,3:0.24,4:0.36};
    const Z=Z_vals[+f.seismic]||0.16;
    const W_seismic=(DL+0.25*LL);
    const Vb_seismic=Z/2*1.0/5*2.5*W_seismic;
    const factored=1.5*(DL+LL);
    const res={area:area.toFixed(1),DL:DL.toFixed(0),LL:LL.toFixed(0),SL:SL.toFixed(0),WL:WL.toFixed(0),EL:Vb_seismic.toFixed(0),total:(DL+LL+SL).toFixed(0),factored:factored.toFixed(0)};
    setR(res);
    onSave('Load Calculation',f,res,`Total: ${res.total}kN, Factored: ${res.factored}kN`);
  };
  return (
    <div>
      <div className="formula-box">
        <strong>IS 875 Load Combinations:</strong><br/>
        Dead Load (DL) + Live Load (LL) + Wind/Seismic<br/>
        <strong>Factored Load (IS 456):</strong> Wu = 1.5(DL + LL) or 1.2(DL + LL + WL)
      </div>
      <div className="calc-layout">
        <div className="calc-panel">
          <div className="panel-title">Structure Parameters</div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Length <span>(m)</span></div><input className="f-input" value={f.length} onChange={set('length')}/></div>
            <div className="f-group"><div className="f-label">Width <span>(m)</span></div><input className="f-input" value={f.width} onChange={set('width')}/></div>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">No. of Floors</div><input className="f-input" value={f.floors} onChange={set('floors')}/></div>
            <div className="f-group"><div className="f-label">Floor Height <span>(m)</span></div><input className="f-input" value={f.floor_h} onChange={set('floor_h')}/></div>
          </div>
          <div className="panel-title" style={{marginTop:16}}>Dead Loads (kN/m²)</div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Slab Self-Weight</div><input className="f-input" value={f.dead_slab} onChange={set('dead_slab')}/></div>
            <div className="f-group"><div className="f-label">Floor Finishes</div><input className="f-input" value={f.dead_finish} onChange={set('dead_finish')}/></div>
          </div>
          <div className="f-group"><div className="f-label">Walls (kN/m²)</div><input className="f-input" value={f.dead_walls} onChange={set('dead_walls')}/></div>
          <div className="panel-title" style={{marginTop:16}}>Live / Imposed Loads</div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Live Load <span>(kN/m²)</span></div><input className="f-input" value={f.live} onChange={set('live')}/><div className="f-note">Residential=2, Office=4, Storage=5</div></div>
            <div className="f-group"><div className="f-label">Snow Load <span>(kN/m²)</span></div><input className="f-input" value={f.snow} onChange={set('snow')}/></div>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Wind Speed <span>(m/s)</span></div><input className="f-input" value={f.wind_speed} onChange={set('wind_speed')}/></div>
            <div className="f-group"><div className="f-label">Seismic Zone <span>(IS 1893)</span></div>
              <select className="f-select" value={f.seismic} onChange={set('seismic')}>
                {[1,2,3,4].map(z=><option key={z} value={z}>Zone {z} {z===1?'(Low)':z===2?'(Moderate)':z===3?'(Severe)':'(Very Severe)'}</option>)}
              </select>
            </div>
          </div>
          <button className="calc-btn" onClick={calc}>Calculate Loads</button>
        </div>
        <div className="calc-panel">
          <div className="panel-title">Load Summary</div>
          {r ? (
            <>
              <div className="chart-wrap">
                <ChartCanvas type="bar" data={{
                  labels:['Dead Load','Live Load','Snow Load','Wind Load','Seismic Base\nShear'],
                  datasets:[{
                    label:'Load (kN)',
                    data:[+r.DL,+r.LL,+r.SL,+r.WL,+r.EL],
                    backgroundColor:['rgba(14,165,233,0.7)','rgba(16,185,129,0.7)','rgba(99,102,241,0.7)','rgba(245,158,11,0.7)','rgba(239,68,68,0.7)'],
                    borderRadius:4,borderWidth:0,
                  }]
                }}/>
              </div>
              <div className="result info" style={{marginTop:12}}>
                <div className="r-grid">
                  <div className="r-item"><div className="r-key">Floor Area</div><div className="r-val">{r.area}<span className="r-unit">m²</span></div></div>
                  <div className="r-item"><div className="r-key">Total Dead</div><div className="r-val">{r.DL}<span className="r-unit">kN</span></div></div>
                  <div className="r-item"><div className="r-key">Total Live</div><div className="r-val">{r.LL}<span className="r-unit">kN</span></div></div>
                  <div className="r-item"><div className="r-key">Wind Load</div><div className="r-val">{r.WL}<span className="r-unit">kN</span></div></div>
                  <div className="r-item"><div className="r-key">Seismic V</div><div className="r-val">{r.EL}<span className="r-unit">kN</span></div></div>
                  <div className="r-item"><div className="r-key">Total SLS</div><div className="r-val">{r.total}<span className="r-unit">kN</span></div></div>
                </div>
                <div className="r-formula">Factored Load (ULS): <strong style={{color:'#fff'}}>{r.factored} kN</strong> = 1.5(DL+LL)</div>
              </div>
            </>
          ) : <div className="empty-state"><div className="empty-icon">🏗️</div><div className="empty-msg">Load summary and chart appear after calculation</div></div>}
        </div>
      </div>
    </div>
  );
}

/* ── 4. SOIL BEARING CAPACITY (TERZAGHI) ── */
function SoilCalc({ onSave }) {
  const [f, setF] = useState({ phi:'30', c:'20', gamma:'18', Df:'1.5', B:'1.5', shape:'strip', wt:'no' });
  const [r, setR] = useState(null);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const calc = () => {
    const phi_rad=(+f.phi)*Math.PI/180;
    const c=+f.c, g=+f.gamma, Df=+f.Df, B=+f.B;
    // Terzaghi bearing capacity factors
    const Nq=Math.exp(Math.PI*Math.tan(phi_rad))*Math.tan(Math.PI/4+phi_rad/2)**2;
    const Nc=f.phi==0?5.14:(Nq-1)/Math.tan(phi_rad);
    const Ng=2*(Nq+1)*Math.tan(phi_rad);
    // Shape factors
    let sc=1,sq=1,sg=1;
    if(f.shape==='square'||f.shape==='circular'){sc=1.3;sq=1.2;sg=0.8;}
    else if(f.shape==='rectangular'){sc=1+0.2*B/1.5;sq=1+0.1*B/1.5;sg=1-0.1*B/1.5;}
    // Water table correction
    const wt_factor=f.wt==='yes'?0.5:1;
    const q=g*Df;
    const qu=c*Nc*sc + q*Nq*sq + 0.5*g*wt_factor*B*Ng*sg;
    const FS=3, qa=qu/FS;
    // Net ultimate
    const qnet_ult=qu-q;
    const res={qu:qu.toFixed(1),qa:qa.toFixed(1),qnet_ult:qnet_ult.toFixed(1),Nc:Nc.toFixed(2),Nq:Nq.toFixed(2),Ng:Ng.toFixed(2),q:q.toFixed(1),FS};
    setR(res);
    onSave('Soil Bearing Capacity',f,res,`qu=${res.qu}kPa, qa=${res.qa}kPa`);
  };
  return (
    <div>
      <div className="formula-box">
        <strong>Terzaghi (1943):</strong> qu = c·Nc·sc + q·Nq·sq + 0.5·γ·B·Nγ·sγ<br/>
        <strong>Bearing Capacity Factors:</strong> Nq=e^(π·tanφ)·tan²(45+φ/2), Nc=(Nq-1)/tanφ, Nγ=2(Nq+1)tanφ<br/>
        <strong>Safe Bearing Capacity:</strong> qa = qu / FOS (FOS=3 recommended)
      </div>
      <div className="calc-layout">
        <div className="calc-panel">
          <div className="panel-title">Soil & Foundation Parameters</div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Friction Angle φ <span>(°)</span></div><input className="f-input" value={f.phi} onChange={set('phi')}/><div className="f-note">Sand: 28–38° | Clay: 0–20°</div></div>
            <div className="f-group"><div className="f-label">Cohesion c <span>(kPa)</span></div><input className="f-input" value={f.c} onChange={set('c')}/><div className="f-note">Sand≈0 | Soft clay: 10–40</div></div>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Unit Weight γ <span>(kN/m³)</span></div><input className="f-input" value={f.gamma} onChange={set('gamma')}/><div className="f-note">Typical: 16–20 kN/m³</div></div>
            <div className="f-group"><div className="f-label">Depth of Fdn <span>(m)</span></div><input className="f-input" value={f.Df} onChange={set('Df')}/></div>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Foundation Width B <span>(m)</span></div><input className="f-input" value={f.B} onChange={set('B')}/></div>
            <div className="f-group"><div className="f-label">Foundation Shape</div>
              <select className="f-select" value={f.shape} onChange={set('shape')}>
                <option value="strip">Strip Footing</option>
                <option value="square">Square Footing</option>
                <option value="rectangular">Rectangular Footing</option>
                <option value="circular">Circular Footing</option>
              </select>
            </div>
          </div>
          <div className="f-group"><div className="f-label">Water Table at Foundation Level?</div>
            <select className="f-select" value={f.wt} onChange={set('wt')}>
              <option value="no">No — water table deep</option>
              <option value="yes">Yes — at or near footing</option>
            </select>
          </div>
          <button className="calc-btn green" onClick={calc}>Calculate Bearing Capacity</button>
          {r && (
            <div className="result ok">
              <div className="r-grid">
                <div className="r-item"><div className="r-key">Ultimate Capacity</div><div className="r-val">{r.qu}<span className="r-unit">kPa</span></div></div>
                <div className="r-item"><div className="r-key">Safe Capacity (FOS=3)</div><div className="r-val">{r.qa}<span className="r-unit">kPa</span></div></div>
                <div className="r-item"><div className="r-key">Net Ultimate</div><div className="r-val">{r.qnet_ult}<span className="r-unit">kPa</span></div></div>
                <div className="r-item"><div className="r-key">Surcharge q</div><div className="r-val">{r.q}<span className="r-unit">kPa</span></div></div>
              </div>
              <div className="r-formula">Nc={r.Nc} · Nq={r.Nq} · Nγ={r.Ng}</div>
            </div>
          )}
        </div>
        <div className="calc-panel">
          <div className="panel-title">Bearing Capacity Factors vs φ</div>
          <div className="chart-wrap" style={{height:260}}>
            <ChartCanvas type="line" data={{
              labels:[0,5,10,15,20,25,30,35,40,45],
              datasets:[
                {label:'Nc',data:[5.14,6.49,8.35,10.98,14.83,20.72,30.14,46.12,75.31,133.9],borderColor:'#0ea5e9',pointRadius:3,borderWidth:2,tension:0.3},
                {label:'Nq',data:[1,1.57,2.47,3.94,6.40,10.66,18.40,33.30,64.20,134.9],borderColor:'#f59e0b',pointRadius:3,borderWidth:2,tension:0.3},
                {label:'Nγ',data:[0,0.45,1.22,2.57,5.39,10.88,22.40,48.03,109.4,271.8],borderColor:'#10b981',pointRadius:3,borderWidth:2,tension:0.3},
              ]
            }} options={{scales:{x:{title:{display:true,text:'φ (degrees)',color:'#4a6080'}},y:{type:'logarithmic',title:{display:true,text:'Factor Value',color:'#4a6080'}}}}}/>
          </div>
          {r && (
            <div style={{marginTop:12,padding:'10px 14px',background:'var(--surface2)',borderRadius:6,fontFamily:'var(--mono)',fontSize:'0.72rem',color:'var(--text2)'}}>
              Soil Classification: {+f.phi>=35?'Dense Sand/Gravel':+f.phi>=25?'Medium Dense Sand':+f.phi>=15?'Loose Sand / Sandy Clay':'Soft to Medium Clay'}<br/>
              Safe for building loads: {+r.qa>150?'✓ Yes (>150 kPa)':+r.qa>75?'⚠ Marginal (75–150 kPa)':'✗ Requires improvement'}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── 5. RC COLUMN DESIGN ── */
function ColumnCalc({ onSave }) {
  const [f, setF] = useState({ Pu:'1200', Mu:'80', b:'400', D:'400', fck:'25', fy:'415', cover:'40', type:'short' });
  const [r, setR] = useState(null);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const calc = () => {
    const Pu=+f.Pu,b=+f.b/1000,D=+f.D/1000,fck=+f.fck,fy=+f.fy,cover=+f.cover/1000;
    if(!Pu||!b||!D||!fck||!fy){setR({err:'Fill all required fields.'});return;}
    const Ag=b*D;
    // IS 456 — Axial load capacity of short column
    // Pu_max = 0.4·fck·Ac + 0.67·fy·Ast (for Ast=1% Ag as minimum)
    const Ast_min=0.01*Ag;
    const Ac_min=Ag-Ast_min;
    const Pu_cap_min=(0.4*fck*Ac_min*1e6 + 0.67*fy*Ast_min*1e6)/1000;
    // Required Ast for given Pu
    // Pu = 0.4·fck·(Ag-Ast) + 0.67·fy·Ast
    // Ast = (Pu*1000 - 0.4*fck*Ag*1e6) / (0.67*fy - 0.4*fck) [in m²]
    const Ast_req=(Pu*1000 - 0.4*fck*Ag*1e6) / ((0.67*fy - 0.4*fck)*1e6);
    const Ast_design=Math.max(Ast_req, Ast_min)*1e6; // mm²
    const pct=(Ast_design/(Ag*1e6))*100;
    const OK=pct>=0.8&&pct<=6;
    // Slenderness check
    const eff_len=+f.type==='long'?+f.D*15:+f.D*10;
    const lambda=eff_len/(0.288*Math.min(+f.b,+f.D));
    const isShort=lambda<12;
    const res={Ag:(Ag*1e6).toFixed(0),Ast:Ast_design.toFixed(0),pct:pct.toFixed(2),Pu_cap:Pu_cap_min.toFixed(0),OK,lambda:lambda.toFixed(1),isShort};
    setR(res);
    onSave('Column Design',f,res,`Ast=${res.Ast}mm² (${res.pct}%)`);
  };
  return (
    <div>
      <div className="formula-box">
        <strong>IS 456:2000 — Short Column:</strong> Pu = 0.4·fck·Ac + 0.67·fy·Ast<br/>
        <strong>Min. steel:</strong> 0.8% of Ag | <strong>Max. steel:</strong> 6% of Ag<br/>
        <strong>Short column:</strong> λ = Le/i &lt; 12
      </div>
      <div className="calc-layout">
        <div className="calc-panel">
          <div className="panel-title">Column Parameters</div>
          <div className="f-group">
            <div className="f-label">Column Type</div>
            <select className="f-select" value={f.type} onChange={set('type')}>
              <option value="short">Short Column</option>
              <option value="long">Slender/Long Column</option>
            </select>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Width b <span>(mm)</span></div><input className="f-input" value={f.b} onChange={set('b')}/></div>
            <div className="f-group"><div className="f-label">Depth D <span>(mm)</span></div><input className="f-input" value={f.D} onChange={set('D')}/></div>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">Axial Load Pu <span>(kN)</span></div><input className="f-input" value={f.Pu} onChange={set('Pu')}/></div>
            <div className="f-group"><div className="f-label">Moment Mu <span>(kN·m)</span></div><input className="f-input" value={f.Mu} onChange={set('Mu')}/></div>
          </div>
          <div className="f-row">
            <div className="f-group"><div className="f-label">fck <span>(MPa)</span></div>
              <select className="f-select" value={f.fck} onChange={set('fck')}>
                {[20,25,30,35,40].map(v=><option key={v} value={v}>M{v} — {v} MPa</option>)}
              </select>
            </div>
            <div className="f-group"><div className="f-label">fy <span>(MPa)</span></div>
              <select className="f-select" value={f.fy} onChange={set('fy')}>
                <option value="250">Fe250 — Mild Steel</option>
                <option value="415">Fe415 — HYSD</option>
                <option value="500">Fe500 — TMT</option>
                <option value="550">Fe550 — TMT+</option>
              </select>
            </div>
          </div>
          <button className="calc-btn" onClick={calc}>Design Column</button>
          {r?.err && <div className="result err">{r.err}</div>}
          {r && !r.err && (
            <div className={`result ${r.OK?'ok':'warn'}`}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <span className={r.OK?'status-badge status-safe':'status-badge status-warn'}>{r.OK?'✓ Steel % OK':'⚠ Check Steel %'}</span>
                <span className={r.isShort?'status-badge status-safe':'status-badge status-warn'}>{r.isShort?'Short Column':'Slender Column'}</span>
              </div>
              <div className="r-grid">
                <div className="r-item"><div className="r-key">Gross Area Ag</div><div className="r-val">{r.Ag}<span className="r-unit">mm²</span></div></div>
                <div className="r-item"><div className="r-key">Required Ast</div><div className="r-val">{r.Ast}<span className="r-unit">mm²</span></div></div>
                <div className="r-item"><div className="r-key">Steel %</div><div className="r-val">{r.pct}<span className="r-unit">%</span></div></div>
                <div className="r-item"><div className="r-key">Slenderness λ</div><div className="r-val">{r.lambda}</div></div>
              </div>
            </div>
          )}
        </div>
        <div className="calc-panel">
          <div className="panel-title">Steel % vs Column Size</div>
          <div className="chart-wrap">
            <ChartCanvas type="bar" data={{
              labels:['200×200','250×250','300×300','350×350','400×400','500×500'],

/* ── 6. UNIT CONVERTER ── */
function UnitConv({ onSave }) {
  const CATS={
    Length:{units:['mm','cm','m','km','in','ft','yd','mi'],factors:{mm:1e-3,cm:1e-2,m:1,km:1e3,in:0.0254,ft:0.3048,yd:0.9144,mi:1609.344}},
    Area:{units:['mm²','cm²','m²','km²','in²','ft²','ac','ha'],factors:{'mm²':1e-6,'cm²':1e-4,'m²':1,'km²':1e6,'in²':6.4516e-4,'ft²':0.0929,'ac':4046.86,'ha':1e4}},
    Volume:{units:['mL','L','m³','cm³','in³','ft³','gal'],factors:{mL:1e-6,L:1e-3,'m³':1,'cm³':1e-6,'in³':1.6387e-5,'ft³':0.028317,gal:3.785e-3}},
    Force:{units:['N','kN','MN','kgf','lbf','tonf'],factors:{N:1,kN:1e3,MN:1e6,kgf:9.80665,lbf:4.44822,tonf:9806.65}},
    Pressure:{units:['Pa','kPa','MPa','bar','atm','psi','ksi'],factors:{Pa:1,kPa:1e3,MPa:1e6,bar:1e5,atm:101325,psi:6894.76,ksi:6894760}},
    Mass:{units:['g','kg','tonne','lb','oz'],factors:{g:0.001,kg:1,tonne:1000,lb:0.453592,oz:0.028350}},
    Temp:{units:['°C','°F','K'],factors:null},
  };
  const [cat,setCat]=useState('Length');
  const [from,setFrom]=useState('m');
  const [to,setTo]=useState('ft');
  const [val,setVal]=useState('');
  const convertTemp=(v,f,t)=>{let c;if(f==='°C')c=+v;else if(f==='°F')c=(+v-32)*5/9;else c=+v-273.15;if(t==='°C')return c.toPrecision(6);if(t==='°F')return(c*9/5+32).toPrecision(6);return(c+273.15).toPrecision(6);};
  const result=useMemo(()=>{if(!val||isNaN(val))return'';if(cat==='Temp')return convertTemp(val,from,to);const f=CATS[cat].factors;return((+val*f[from])/f[to]).toPrecision(6).replace(/\.?0+$/,'');},[val,from,to,cat]);
  const changeCat=c=>{setCat(c);const u=CATS[c].units;setFrom(u[0]);setTo(u[1]);setVal('');};
  return (
    <div>
      <div className="calc-layout">
        <div className="calc-panel">
          <div className="panel-title">Unit Converter</div>
          <div className="f-group"><div className="f-label">Category</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:6}}>
              {Object.keys(CATS).map(c=>(
                <button key={c} onClick={()=>changeCat(c)} style={{padding:'5px 12px',background:cat===c?'var(--blue)':'var(--surface2)',border:`1px solid ${cat===c?'var(--blue)':'var(--border)'}`,borderRadius:4,color:cat===c?'#fff':'var(--text2)',cursor:'pointer',fontFamily:'var(--sans)',fontSize:'0.78rem',fontWeight:600}}>{c}</button>
              ))}
            </div>
          </div>
          <div className="f-group"><div className="f-label">From</div>
            <select className="f-select" value={from} onChange={e=>{setFrom(e.target.value)}}>
              {CATS[cat].units.map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
          <div className="f-group"><div className="f-label">Value</div>
            <input className="f-input" type="number" placeholder="Enter value..." value={val} onChange={e=>setVal(e.target.value)}/>
          </div>
          <div className="f-group"><div className="f-label">To</div>
            <select className="f-select" value={to} onChange={e=>setTo(e.target.value)}>
              {CATS[cat].units.map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
          {val && result && (
            <div className="result info" style={{marginTop:12}}>
              <div className="r-key">Result</div>
              <div style={{fontFamily:'var(--mono)',fontSize:'1.4rem',fontWeight:700,margin:'6px 0'}}>{result} <span style={{fontSize:'0.9rem',opacity:0.8}}>{to}</span></div>
              <div className="r-note">{val} {from} = {result} {to}</div>
              {cat!=='Temp'&&<div className="r-formula">Factor: 1 {from} = {((CATS[cat].factors[from])/(CATS[cat].factors[to])).toPrecision(4)} {to}</div>}
            </div>
          )}
        </div>
        <div className="calc-panel">
          <div className="panel-title">Quick Reference — Engineering Units</div>
          {[
            {g:'Structural',rows:[['1 kN/m²','= 1 kPa = 20.9 psf'],['1 MPa','= 1 N/mm² = 145 psi'],['1 kN','= 0.2248 kip = 101.97 kgf']]},
            {g:'Geometry',rows:[['1 m²','= 10.764 ft²'],['1 acre','= 4047 m² = 0.4047 ha'],['1 litre','= 0.001 m³ = 0.2642 gal']]},
            {g:'Weight / Density',rows:[['1 kN/m³','= 6.366 pcf'],['Water','= 9.81 kN/m³ = 1000 kg/m³'],['Steel','= 78.5 kN/m³ | Concrete = 24 kN/m³']]},
          ].map(s=>(
            <div key={s.g} style={{marginBottom:16}}>
              <div style={{fontFamily:'var(--mono)',fontSize:'0.62rem',color:'var(--blue)',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8}}>{s.g}</div>
              {s.rows.map(([a,b])=>(
                <div key={a} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:'0.75rem'}}>
                  <span style={{color:'var(--text)'}}>{a}</span>
                  <span style={{color:'var(--text2)'}}>{b}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── 7. AREA & VOLUME ── */
function AreaCalc({ onSave }) {
  const [shape,setShape]=useState('rectangle');
  const [dims,setDims]=useState({});
  const [r,setR]=useState(null);
  const SHAPES={
    rectangle:{label:'Rectangle / Slab',fields:[{k:'l',l:'Length (m)'},{k:'w',l:'Width (m)'},{k:'h',l:'Thickness (m)',opt:true}]},
    circle:{label:'Circle / Circular Slab',fields:[{k:'r',l:'Radius (m)'},{k:'h',l:'Thickness (m)',opt:true}]},
    triangle:{label:'Triangle',fields:[{k:'b',l:'Base (m)'},{k:'h',l:'Height (m)'}]},
    trapezoid:{label:'Trapezoid (Road/Channel)',fields:[{k:'a',l:'Top Width (m)'},{k:'b',l:'Bottom Width (m)'},{k:'h',l:'Height (m)'},{k:'len',l:'Length (m)',opt:true}]},
    cylinder:{label:'Cylinder (Column/Pile)',fields:[{k:'r',l:'Radius (m)'},{k:'h',l:'Height (m)'}]},
    'hollow-cyl':{label:'Hollow Cylinder (Pipe)',fields:[{k:'R',l:'Outer Radius (m)'},{k:'r',l:'Inner Radius (m)'},{k:'h',l:'Length (m)'}]},
    cuboid:{label:'Cuboid (Wall/Footing)',fields:[{k:'l',l:'Length (m)'},{k:'w',l:'Width (m)'},{k:'h',l:'Height (m)'}]},
    sphere:{label:'Sphere (Tank/Dome)',fields:[{k:'r',l:'Radius (m)'}]},
  };
  const setD=k=>e=>setDims(d=>({...d,[k]:e.target.value}));
  const calc=()=>{
    const d={};for(const f of SHAPES[shape].fields)d[f.k]=parseFloat(dims[f.k])||0;
    let area,volume,perimeter;
    try{
      if(shape==='rectangle'){area=d.l*d.w;if(d.h)volume=area*d.h;perimeter=2*(d.l+d.w);}
      else if(shape==='circle'){area=Math.PI*d.r**2;if(d.h)volume=area*d.h;perimeter=2*Math.PI*d.r;}
      else if(shape==='triangle'){area=0.5*d.b*d.h;}
      else if(shape==='trapezoid'){area=0.5*(d.a+d.b)*d.h;if(d.len)volume=area*d.len;}
      else if(shape==='cylinder'){area=Math.PI*d.r**2;volume=area*d.h;}
      else if(shape==='hollow-cyl'){area=Math.PI*(d.R**2-d.r**2);volume=area*d.h;}
      else if(shape==='cuboid'){volume=d.l*d.w*d.h;area=d.l*d.w;perimeter=2*(d.l+d.w);}
      else if(shape==='sphere'){volume=(4/3)*Math.PI*d.r**3;area=4*Math.PI*d.r**2;}
      if((!area&&!volume)||isNaN(area||volume))throw 0;
      const res={area:area?area.toFixed(4):null,volume:volume?volume.toFixed(4):null,perimeter:perimeter?perimeter.toFixed(3):null};
      setR({...res,ok:true});
      onSave('Area & Volume',{shape,...dims},res,`A=${res.area||'—'}m² V=${res.volume||'—'}m³`);
    }catch{setR({err:'Fill all required fields.'});}
  };
  return(
    <div className="calc-layout">
      <div className="calc-panel">
        <div className="panel-title">Shape & Dimensions</div>
        <div className="f-group"><div className="f-label">Shape</div>
          <select className="f-select" value={shape} onChange={e=>{setShape(e.target.value);setDims({});setR(null);}}>
            {Object.entries(SHAPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        {SHAPES[shape].fields.map(f=>(
          <div className="f-group" key={f.k}>
            <div className="f-label">{f.l}{f.opt&&<span style={{color:'var(--text3)',fontWeight:300}}> (optional)</span>}</div>
            <input className="f-input" type="number" value={dims[f.k]||''} onChange={setD(f.k)} placeholder="0.00"/>
          </div>
        ))}
        <button className="calc-btn green" onClick={calc}>Calculate</button>
        {r?.err&&<div className="result err">{r.err}</div>}
        {r?.ok&&(
          <div className="result ok">
            <div className="r-grid">
              {r.area&&<div className="r-item"><div className="r-key">Area</div><div className="r-val">{r.area}<span className="r-unit">m²</span></div><div style={{fontSize:'0.65rem',opacity:0.7,fontFamily:'var(--mono)'}}>{(+r.area*10.764).toFixed(2)} ft²</div></div>}
              {r.volume&&<div className="r-item"><div className="r-key">Volume</div><div className="r-val">{r.volume}<span className="r-unit">m³</span></div><div style={{fontSize:'0.65rem',opacity:0.7,fontFamily:'var(--mono)'}}>{(+r.volume*35.315).toFixed(2)} ft³</div></div>}
              {r.perimeter&&<div className="r-item"><div className="r-key">Perimeter</div><div className="r-val">{r.perimeter}<span className="r-unit">m</span></div></div>}
            </div>
            {r.volume&&<div className="r-formula">Concrete needed: {(+r.volume).toFixed(3)} m³ → ~{(+r.volume*8).toFixed(0)} bags OPC (M20)</div>}
          </div>
        )}
      </div>
      <div className="calc-panel">
        <div className="panel-title">Formula Sheet</div>
        {[
          ['Rectangle','A=l×w','V=l×w×h'],
          ['Circle','A=πr²','V=πr²h'],
          ['Triangle','A=½bh','—'],
          ['Trapezoid','A=½(a+b)h','V=A×L'],
          ['Cylinder','A=πr²','V=πr²h'],
          ['Hollow Cyl.','A=π(R²-r²)','V=A×h'],
          ['Cuboid','A=l×w','V=l×w×h'],
          ['Sphere','A=4πr²','V=⁴⁄₃πr³'],
        ].map(([s,a,v])=>(
          <div key={s} style={{display:'grid',gridTemplateColumns:'120px 1fr 1fr',padding:'7px 0',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:'0.72rem'}}>
            <span style={{color:'var(--green)',fontWeight:700}}>{s}</span>
            <span style={{color:'var(--text2)'}}>{a}</span>
            <span style={{color:'var(--text3)'}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

  const navigate=id=>{setPage(id);setSideOpen(false);};
  const meta=PAGE_META[page]||PAGE_META.home;
  const initials=user.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);

  const renderPage=()=>{
    switch(page){
      case 'home': return <Dashboard user={user} history={history} navigate={navigate}/>;
      case 'beam': return <BeamCalc onSave={save}/>;
      case 'concrete': return <ConcreteMix onSave={save}/>;
      case 'loads': return <LoadCalc onSave={save}/>;
      case 'soil': return <SoilCalc onSave={save}/>;
      case 'column': return <ColumnCalc onSave={save}/>;
      case 'converter': return <UnitConv onSave={save}/>;
      case 'area': return <AreaCalc onSave={save}/>;
      case 'history': return <HistoryPage history={history} remove={remove} clear={clear}/>;
      case 'profile': return <ProfilePage user={user} history={history} onLogout={logout}/>;
      default: return null;
    }
  };

  return(
    <>
      <div className="app">
        {/* SIDEBAR */}
        <nav className={`sidebar${sideOpen?' open':''}`}>
          <div className="sidebar-head">
            <div className="sidebar-logo">Civil<span>Calc</span></div>
            <div className="sidebar-version">Pro Suite · IS Code Edition</div>
            <div className="sidebar-user">
              <div className="user-avatar">{initials}</div>
              <div><div className="user-name">{user.name}</div><div className="user-role">{user.role||'Engineer'}</div></div>
            </div>
          </div>
          <div className="nav">
            {NAV.map(g=>(
              <div key={g.group}>
                <div className="nav-group-label">{g.group}</div>
                {g.items.map(i=>(
                  <button key={i.id} className={`nav-item${page===i.id?' active':''}`} onClick={()=>navigate(i.id)}>
                    <span className="ni-icon">{i.icon}</span>{i.label}
                    {i.id==='history'&&history.length>0&&<span style={{marginLeft:'auto',background:'var(--blue)',color:'#fff',fontSize:'0.6rem',padding:'1px 6px',borderRadius:10,fontFamily:'var(--mono)'}}>{history.length}</span>}
                  </button>
                ))}
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <button className="logout-btn" onClick={logout}>
              <span>⇥</span> Sign Out
            </button>
          </div>
        </nav>

        {/* MAIN */}
        <main className="main">
          <div className="page-head">
            <div className="breadcrumb">CivilCalc Pro <span>/ {meta.title}</span></div>
            <h1 className="page-title">{meta.title}</h1>
            <p className="page-desc">{meta.desc}</p>
          </div>
          <div className="page-body animate" key={page}>
            {renderPage()}
          </div>
        </main>
      </div>

      {/* MOBILE HAMBURGER — top-left, visible below 1024px */}
      <button className="mob-toggle" onClick={()=>setSideOpen(o=>!o)} aria-label="Toggle menu">
        {sideOpen ? '✕' : '☰'}
      </button>
      <div className={`mob-overlay${sideOpen?' show':''}`} onClick={()=>setSideOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
